<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RO - Berau Logistics System</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #064e3b;
        }
        /* Teknik Clipping untuk menyembunyikan Banner Google */
        iframe {
            position: absolute;
            top: -50px; /* Tinggi banner Google biasanya 45px-50px */
            left: 0;
            width: 100%;
            height: calc(100% + 55px);
            border: none;
        }
        /* Perbaikan untuk HP agar tidak ada gap putih di bawah */
        @media (max-width: 768px) {
            iframe {
                top: -55px;
                height: calc(100% + 55px);
            }
        }
    </style>
</head>
<body>
    <!-- Ganti URL di bawah dengan URL Deploy Web App Anda -->
    <iframe src="https://script.google.com/macros/s/AKfycbyEPfQYjc_P5iCmX1mCzOaKCmYJ7zJQhWM28CY9wIX2Jz8Fb3J4k79_eVD46kN92UoN/exec" allow="geolocation; microphone; camera"></iframe>
</body>
</html>
